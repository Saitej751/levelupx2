<?xml version="1.0" encoding="UTF-8"?>
<svg width="600" height="180" viewBox="0 0 600 180" xmlns="http://www.w3.org/2000/svg">

  <!-- Shield -->
  <path d="M90 30 L150 60 L150 120 L90 150 L30 120 L30 60 Z"
        fill="#0F172A"/>

  <!-- Upward Arrow -->
  <path d="M55 105 C75 85, 95 85, 115 65 
           L110 60 
           L145 55 
           L135 85 
           L125 75 
           C105 95, 85 100, 65 120 Z"
        fill="#F97316"/>

  <!-- Graduation Cap -->
  <polygon points="50,40 90,25 130,40 90,55"
           fill="#1E3A8A"/>
  <line x1="90" y1="55" x2="90" y2="75"
        stroke="#1E3A8A" stroke-width="4"/>
  <circle cx="90" cy="80" r="4" fill="#1E3A8A"/>

  <!-- Text: LevelUpX -->
  <text x="180" y="85"
        font-family="Arial, Helvetica, sans-serif"
        font-size="48"
        font-weight="bold"
        fill="#1E3A8A">
    LevelUp<tspan fill="#F97316">X</tspan>
  </text>

  <!-- Text: CAMPUS -->
  <text x="185" y="125"
        font-family="Arial, Helvetica, sans-serif"
        font-size="20"
        letter-spacing="5"
        fill="#475569">
    CAMPUS
  </text>

</svg>
